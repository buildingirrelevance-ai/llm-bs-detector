<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LLM BS Detector</title>
  <link rel="stylesheet" href="panel.css" />
</head>
<body>
  <header class="bs-header">
    <h1>BS Detector</h1>
    <div class="bs-counts">
      <span class="bs-count bs-count-red" id="redCount">0</span>
      <span class="bs-count bs-count-yellow" id="yellowCount">0</span>
    </div>
  </header>

  <div class="bs-host" id="hostName">Not connected</div>

  <div class="bs-settings" id="settingsPanel" style="display:none;">
    <div class="bs-settings-row">
      <label>Provider</label>
      <select id="cfgProvider">
        <option value="openai">OpenAI</option>
        <option value="anthropic">Anthropic</option>
        <option value="grok">Grok (xAI)</option>
        <option value="deepseek">DeepSeek</option>
        <option value="gemini">Gemini</option>
        <option value="custom">Custom (OpenAI-compatible)</option>
      </select>
    </div>
    <div class="bs-settings-row" id="rowBaseUrl">
      <label>Base URL</label>
      <input id="cfgBaseUrl" type="text" placeholder="https://api.openai.com/v1" />
    </div>
    <div class="bs-settings-row">
      <label>API Key</label>
      <input id="cfgApiKey" type="password" placeholder="sk-..." />
    </div>
    <div class="bs-settings-row">
      <label>Model</label>
      <input id="cfgModel" type="text" placeholder="gpt-4o-mini" />
    </div>
    <button id="saveSettingsBtn">Save</button>
  </div>

  <div class="bs-flags" id="flagsList">
    <div class="bs-empty">
      No flags yet. Open Claude.ai or ChatGPT and start chatting — flags will appear here as the AI responds.
    </div>
  </div>

  <footer class="bs-footer">
    <button id="clearBtn">Clear flags</button>
    <button id="settingsBtn">⚙ Settings</button>
    <a href="https://github.com/buildingirrelevance-ai/llm-bs-detector" target="_blank">GitHub</a>
  </footer>

  <script src="panel.js"></script>
</body>
</html>
